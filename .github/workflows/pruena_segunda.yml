name: install_node_newman
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.19
      - run: npm ci
      - run: npm test

      - name: Install newman
        run: npm install -g newman

      - name: Ejecutar newman
        run: newman run Pruebas de API.postman_collection.json
        
        
          
    
