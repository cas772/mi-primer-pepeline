name: install_node_newman
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
            - name: Setup Node.js environment
              uses: actions/setup-node@v6.4.0
            - name: Install newman
              run: npm install -g newman
            - name: Ejecutar newman
              run: newman run Pruebas de API.postman_collection.json
        
        
          
    
